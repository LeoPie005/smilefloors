  </g>
  <!-- SMILE text -->
  <text x="140" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="1" text-anchor="middle" fill="#1a1a1a">Smile</text>
  <!-- FLOORS text -->
  <text x="140" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="4" text-anchor="middle" fill="#555">FLOORS</text>
</svg>
