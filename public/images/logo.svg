<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" fill="none">
  <!-- Diamond/tile shapes -->
  <g transform="translate(110, 8)">
    <!-- Top diamond -->
    <polygon points="15,0 28,12 15,24 2,12" fill="#2d2d2d"/>
    <!-- Left diamond -->
    <polygon points="0,14 13,26 0,38 -13,26" fill="#555"/>
    <!-- Right diamond -->
    <polygon points="30,14 43,26 30,38 17,26" fill="#888"/>
